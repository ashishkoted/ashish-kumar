<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1D4ED8" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#7C3AED" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="mainGrad" x1="96" y1="94" x2="416" y2="418" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.48" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.22 0 0 0 0 0.74 0 0 0 0 0.97 0 0 0 0.75 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="118" fill="#020617"/>
  <rect x="18" y="18" width="476" height="476" rx="104" fill="url(#bgGlow)"/>
  <path d="M84 116C162 58 327 54 423 144C343 101 210 101 84 116Z" fill="white" opacity="0.06"/>
  <circle cx="378" cy="126" r="68" fill="#38BDF8" opacity="0.10"/>
  <circle cx="124" cy="382" r="92" fill="#A855F7" opacity="0.12"/>

  <g filter="url(#shadow)">
    <rect x="72" y="72" width="368" height="368" rx="86" fill="#0F172A" fill-opacity="0.78" stroke="url(#mainGrad)" stroke-width="10"/>
  </g>

  <g filter="url(#softGlow)">
    <path d="M154 206L101 256L154 306" stroke="url(#mainGrad)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M358 206L411 256L358 306" stroke="url(#mainGrad)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="256" y="304" text-anchor="middle"
        font-family="Inter, Poppins, Arial, sans-serif"
        font-size="132" font-weight="900" letter-spacing="-10"
        fill="url(#mainGrad)" filter="url(#softGlow)">AK</text>

  <path d="M205 345H307" stroke="url(#mainGrad)" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
</svg>
